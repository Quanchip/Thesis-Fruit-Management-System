version: '3.8'

services:
  fruitshop-be-test:
    image: mrquan01/fruitshop-be:staging
    container_name: fruitshop-be-test
    ports:
      - "8081:8080"
    environment:
      # On Mac, host.docker.internal allows the container to connect to localhost ports on the host machine
      # (like your existing MySQL container mapped to 3307)
      - DB_HOST=host.docker.internal
      - DB_PORT=3307
      - DB_USER=root
      - DB_PASS=1234
      - DB_DATABASE=db_manach
      - JWT_SECRET=replace_access_secret
      - JWT_REFRESH_SECRET=replace_refresh_secret

  fruitshop-fe-test:
    image: mrquan01/fruitshop-fe:staging
    container_name: fruitshop-fe-test
    ports:
      - "3001:80"
    depends_on:
      - fruitshop-be-test

  nginx-test:
    image: nginx:alpine
    container_name: nginx-test
    ports:
      - "80:80"
    volumes:
      - ./nginx.test.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - fruitshop-fe-test
      - fruitshop-be-test
